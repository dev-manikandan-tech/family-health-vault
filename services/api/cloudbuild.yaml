steps:
  - name: "node:20.18.1"
    entrypoint: "npm"
    args: ["ci"]
    dir: "services/api"
  - name: "node:20.18.1"
    entrypoint: "npm"
    args: ["run", "build"]
    dir: "services/api"
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/fhv-api:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/fhv-api:latest"
      - "."
    dir: "services/api"
images:
  - "gcr.io/$PROJECT_ID/fhv-api:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/fhv-api:latest"
